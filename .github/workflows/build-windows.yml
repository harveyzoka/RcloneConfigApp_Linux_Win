name: Build Windows App

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install dependencies
        run: python -m pip install --upgrade pip && python -m pip install -r requirements.txt

      - name: Build executable
        run: pyinstaller --noconfirm --noconsole --onedir --windowed --icon="app_icon.ico" --add-data="app_icon.ico;." --name="RcloneAutoMount" main.py

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: RcloneAutoMount-Windows
          path: dist/RcloneAutoMount
